<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title> SIS-Music </title>
<style>
  :root{--bg:#0e0f10;--panel:#121213;--muted:#9a9b9c;--accent:#1fbf63;--card:#151516;--glass: rgba(255,255,255,0.03);}
  *{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  body{margin:0;background:linear-gradient(180deg,#0b0b0c,#0e0f10);color:#e6e6e6;min-height:100vh;display:flex}
  .sidebar{width:260px;padding:24px;background:linear-gradient(180deg,var(--panel),#0f1011);display:flex;flex-direction:column;gap:12px}
  .brand{font-weight:800;font-size:20px;color:var(--accent)}
  .u-actions{display:flex;gap:8px;align-items:center}
  .btn{background:#fff;color:#000;padding:8px 12px;border-radius:999px;border:0;cursor:pointer;font-weight:600}
  .btn.secondary{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.06)}
  .btn.small{padding:6px 10px;font-size:12px}
  .playlists{margin-top:8px;flex:1;overflow:auto;padding-right:6px}
  .pl-item{padding:8px 10px;border-radius:6px;color:var(--muted);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .pl-item:hover{background:rgba(255,255,255,0.02);color:#fff}
  .pl-item-actions{display:flex;gap:6px;align-items:center}
  .delete-btn{background:transparent;color:var(--muted);border:0;cursor:pointer;padding:4px;font-size:14px}
  .delete-btn:hover{color:#ff6b6b}
  .small-muted{color:var(--muted);font-size:12px}
  .main{flex:1;padding:28px;display:flex;flex-direction:column;gap:18px}
  .header{display:flex;justify-content:space-between;align-items:center}
  .search{background:var(--card);padding:8px 12px;border-radius:999px;display:flex;gap:8px;align-items:center;color:var(--muted);min-width:260px}
  .search input{background:transparent;border:0;color:#fff;outline:0;width:100%}
  .profile{display:flex;gap:12px;align-items:center;cursor:pointer}
  .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2b2b2b,#191919);display:inline-block;background-size:cover;background-position:center}
  .artist-group{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
  .artist-header{font-size:16px;font-weight:700;color:#e6e6e6;margin-bottom:4px;padding:8px 0;display:flex;align-items:center;gap:12px}
  .artist-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#2c2c2c,#141414);background-size:cover;background-position:center}
  .album-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;padding-left:8px;border-left:2px solid rgba(31,191,99,0.3)}
  .album-header{display:flex;align-items:center;gap:12px;padding:8px 12px;background:rgba(255,255,255,0.02);border-radius:6px;cursor:pointer;transition:background .15s}
  .album-header:hover{background:rgba(255,255,255,0.06)}
  .album-header-toggle{display:inline-block;transition:transform .2s;font-size:12px;width:14px}
  .album-header-title{font-weight:500;flex:1;color:#d0d0d0;font-size:13px}
  .album-header-count{font-size:11px;color:var(--muted)}
  .album-songs{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-top:8px}
  .album-songs.hidden{display:none}
  .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);padding:12px;border-radius:8px;cursor:pointer;transition:transform .15s;position:relative}
  .card:hover{transform:translateY(-6px)}
  .card-cover{height:120px;border-radius:8px;background:linear-gradient(135deg,#2c2c2c,#141414);display:flex;align-items:end;padding:10px;color:#fff;font-weight:700;font-size:12px}
  .card-delete{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border:0;color:#ff6b6b;border-radius:4px;padding:6px 8px;cursor:pointer;font-size:12px;opacity:0;transition:opacity .15s}
  .card:hover .card-delete{opacity:1}
  .notification{position:fixed;top:20px;right:20px;background:linear-gradient(180deg,#1a1a2e,#16213e);border:1px solid var(--accent);padding:16px 20px;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,0.6);max-width:320px;z-index:40;animation:slideIn .3s ease-out}
  @keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
  .notification-title{font-weight:600;color:#fff;margin-bottom:8px}
  .notification-text{font-size:13px;color:var(--muted);margin-bottom:12px}
  .notification-actions{display:flex;gap:8px}
  .notification-close{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:16px;position:absolute;top:12px;right:12px}
  .notification-close:hover{color:#fff}
  .player{position:fixed;left:260px;right:0;bottom:0;height:92px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);backdrop-filter:blur(6px);display:flex;align-items:center;padding:12px 20px;gap:16px}
  .now{display:flex;gap:12px;align-items:center;width:320px}
  .now .cv{width:64px;height:64px;border-radius:6px;background:linear-gradient(135deg,#232323,#151515);background-size:cover;background-position:center}
  .controls{flex:1;display:flex;flex-direction:column;gap:8px}
  .controls-top{display:flex;align-items:center;gap:12px}
  .title{font-weight:700}
  .progress{height:6px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;cursor:pointer}
  .progress > i{display:block;height:100%;width:0%;background:var(--accent)}
  .control-buttons{display:flex;gap:8px;align-items:center}
  .icon-btn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;cursor:pointer}
  /* modal */
  .modal{position:fixed;left:0;top:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal-card{background:#0f1011;padding:18px;border-radius:10px;width:420px;box-shadow:0 8px 30px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;position:relative}
  .field input[type="text"], .field input[type="file"], .field input[type="number"]{padding:8px;border-radius:6px;background:#141415;border:0;color:#fff}
  .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#141415;border:1px solid rgba(31,191,99,0.3);border-top:0;border-radius:0 0 6px 6px;max-height:150px;overflow-y:auto;z-index:100;display:none}
  .autocomplete-list.active{display:block}
  .autocomplete-item{padding:8px 12px;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.02)}
  .autocomplete-item:hover{background:rgba(31,191,99,0.2);color:#fff}
  .autocomplete-item-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#2c2c2c,#141414);background-size:cover;background-position:center}
  .row{display:flex;gap:8px}
  .error{color:#ff6b6b;font-size:13px;margin-top:6px}
  @media (max-width:880px){.sidebar{display:none}.player{left:0}}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">Spotify In School</div>
    <div class="u-actions">
      <button id="uploadBtn" class="btn secondary">Upload</button>
      <input id="fileInput" type="file" accept="audio/*" multiple style="display:none" />
    </div>

    <div class="playlists">
      <div style="margin-bottom:8px;font-weight:700">Uploaded Songs</div>

  <main class="main">

        <button id="albumCoverCancel" class="btn secondary">Cancel</button>
        <button id="albumCoverSave" class="btn">Save Cover</button>
      </div>
    </div>

<script>
/* ---------- small IndexedDB helpers (songs) ---------- */
function openDB() {
  return new Promise((res, rej) => {
    const rq = indexedDB.open('my_music_db', 1);
    rq.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('songs')) {
        db.createObjectStore('songs', { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains('artists')) {
        db.createObjectStore('artists', { keyPath: 'name', autoIncrement: false });
      }
    };
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
function idbAdd(db, storeName, value) {
  return new Promise((res, rej) => {
    const tx = db.transaction(storeName, 'readwrite');
    const st = tx.objectStore(storeName);
    const rq = st.add(value);
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
function idbGetAll(db, storeName) {
  return new Promise((res, rej) => {
    const tx = db.transaction(storeName, 'readonly');
    const st = tx.objectStore(storeName);
    const rq = st.getAll();
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
function idbDelete(db, storeName, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(storeName, 'readwrite');
    const st = tx.objectStore(storeName);
    const rq = st.delete(key);
    rq.onsuccess = () => res();
    rq.onerror = () => rej(rq.error);
  });
}
function idbUpdate(db, storeName, value) {
  return new Promise((res, rej) => {
    const tx = db.transaction(storeName, 'readwrite');
    const st = tx.objectStore(storeName);
    const rq = st.put(value);
    rq.onsuccess = () => res();
    rq.onerror = () => rej(rq.error);
  });
}
function idbGet(db, storeName, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(storeName, 'readonly');
    const st = tx.objectStore(storeName);
    const rq = st.get(key);
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}

/* ---------- elements ---------- */
const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');
const uploadedList = document.getElementById('uploadedList');
const grid = document.getElementById('grid');
const notificationContainer = document.getElementById('notificationContainer');

const metaModal = document.getElementById('metaModal');
const metaTitle = document.getElementById('metaTitle');
const metaArtist = document.getElementById('metaArtist');
const artistSuggestions = document.getElementById('artistSuggestions');
const artistPfpContainer = document.getElementById('artistPfpContainer');
const metaArtistPfp = document.getElementById('metaArtistPfp');
const metaAlbum = document.getElementById('metaAlbum');
const metaTrackPos = document.getElementById('metaTrackPos');
const metaCover = document.getElementById('metaCover');
const metaSave = document.getElementById('metaSave');
const metaCancel = document.getElementById('metaCancel');

const accountModal = document.getElementById('accountModal');
const acctName = document.getElementById('acctName');
const acctPic = document.getElementById('acctPic');
const acctSave = document.getElementById('acctSave');
const acctCancel = document.getElementById('acctCancel');
const nameError = document.getElementById('nameError');

const albumCoverModal = document.getElementById('albumCoverModal');
const albumCoverName = document.getElementById('albumCoverName');
const albumCoverFile = document.getElementById('albumCoverFile');
const albumCoverSave = document.getElementById('albumCoverSave');
const albumCoverCancel = document.getElementById('albumCoverCancel');

const profileArea = document.getElementById('profileArea');
const topAvatar = document.getElementById('topAvatar');
const topName = document.getElementById('topName');

const playBtn = document.getElementById('play');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const titleEl = document.getElementById('trackTitle');
const artistEl = document.getElementById('trackArtist');
const cvEl = document.getElementById('cv');
const progressOuter = document.getElementById('progress');
const progressInner = progressOuter.querySelector('i');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');

const audio = new Audio();
audio.preload = 'metadata';

/* ---------- state ---------- */
let db;
let pendingFiles = [];
let pendingIndex = 0;
let library = []; // records from DB with generated URLs
let artists = {}; // artist name -> { pfp: url }
let currentIndex = -1;
let playing = false;
let currentAlbumForCover = null;
let shownNotifications = new Set();
let selectedArtist = null;

/* ---------- account (localStorage) ---------- */
const USER_KEY = 'my_music_user';

function loadAccount(){
  try {
    const raw = localStorage.getItem(USER_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(obj && obj.name) {
      topName.textContent = obj.name;
      if(obj.avatar) topAvatar.style.backgroundImage = `url(${obj.avatar})`;
      else topAvatar.style.backgroundImage = '';
      return obj;
    }
  } catch(e){}
  topName.textContent = 'Guest';
  topAvatar.style.backgroundImage = '';
  return null;
}

function saveAccount(obj){
  localStorage.setItem(USER_KEY, JSON.stringify(obj));
  loadAccount();
}

/* simple inappropriate-name checker */
const BAD_WORDS = ['fuck','shit','bitch','asshole','dick','piss','bastard','slut','whore'];

function isNameInappropriate(name){
  if(!name) return {bad:true, reason:'Name is required.'};
  const trimmed = name.trim();
  if(trimmed.length < 2) return {bad:true, reason:'Name too short.'};
  if(trimmed.length > 30) return {bad:true, reason:'Name too long.'};
  if(/^\d+$/.test(trimmed)) return {bad:true, reason:'Name cannot be only numbers.'};
  const lower = trimmed.toLowerCase();
  const cleaned = lower.replace(/[^a-z0-9\s]/g,'');
  for(const w of BAD_WORDS){
    if(cleaned.includes(w)) return {bad:true, reason:'Inappropriate language not allowed.'};
    const re = new RegExp('\\b'+w+'\\b','i');
    if(re.test(lower)) return {bad:true, reason:'Inappropriate language not allowed.'};
  }
  return {bad:false};
}

/* ---------- artist autocomplete ---------- */
async function loadArtists(){
  try {
    const allArtists = await idbGetAll(db, 'artists');
    artists = {};
    allArtists.forEach(a => {
      artists[a.name] = { pfp: a.pfp };
    });
  } catch(err){
    console.error('Load artists error', err);
  }
}

async function saveArtist(name, pfp){
  try {
    await idbUpdate(db, 'artists', { name, pfp });
    artists[name] = { pfp };
  } catch(err){
    console.error('Save artist error', err);
  }
}

function updateArtistSuggestions(){
  const input = metaArtist.value.toLowerCase().trim();
  const matches = Object.keys(artists).filter(a => 
    a.toLowerCase().includes(input) && a.toLowerCase() !== input
  );

  const suggestionsList = artistSuggestions;
  suggestionsList.innerHTML = '';
  
  if(matches.length > 0 && input.length > 0){
    matches.forEach(artistName => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      const pfp = artists[artistName].pfp;
      const avatar = document.createElement('div');
      avatar.className = 'autocomplete-item-avatar';
      if(pfp) avatar.style.backgroundImage = `url(${pfp})`;
      item.appendChild(avatar);
      const label = document.createElement('span');
      label.textContent = artistName;
      item.appendChild(label);
      item.addEventListener('click', ()=>{
        metaArtist.value = artistName;
        selectedArtist = artistName;
        artistPfpContainer.style.display = 'none';
        suggestionsList.classList.remove('active');
      });
      suggestionsList.appendChild(item);
    });
    suggestionsList.classList.add('active');
  } else {
    suggestionsList.classList.remove('active');
  }

  // Check if artist is new
  const fullInput = metaArtist.value.trim();
  if(fullInput && !artists[fullInput]){
    artistPfpContainer.style.display = 'block';
    selectedArtist = null;
  } else {
    artistPfpContainer.style.display = 'none';
    selectedArtist = fullInput || null;
  }
}

metaArtist.addEventListener('input', updateArtistSuggestions);
metaArtist.addEventListener('focus', updateArtistSuggestions);
document.addEventListener('click', (e)=>{
  if(!metaModal.contains(e.target) || !metaArtist.contains(e.target)){
    artistSuggestions.classList.remove('active');
  }
});

/* ---------- notifications ---------- */
function showNotification(albumName, songCount){
  const notifId = `album-${albumName}`;
  if(shownNotifications.has(notifId)) return;
  shownNotifications.add(notifId);

  const notif = document.createElement('div');
  notif.className = 'notification';
  notif.innerHTML = `
    <button class="notification-close">✕</button>
    <div class="notification-title">Album Detected</div>
    <div class="notification-text">We've noticed these songs share an album. Please set a cover.</div>
    <div class="notification-actions">
      <button class="btn small" data-album="${albumName}">Upload Cover</button>
    </div>
  `;
  
  notif.querySelector('.notification-close').addEventListener('click', ()=>{
    notif.remove();
  });

  notif.querySelector('.btn').addEventListener('click', ()=>{
    currentAlbumForCover = albumName;
    albumCoverName.textContent = `Album: ${albumName}`;
    albumCoverFile.value = '';
    albumCoverModal.style.display = 'flex';
    notif.remove();
  });

  notificationContainer.appendChild(notif);
  setTimeout(()=> notif.remove(), 6000);
}

/* ---------- album cover modal ---------- */
albumCoverCancel.addEventListener('click', ()=>{
  albumCoverModal.style.display = 'none';
  currentAlbumForCover = null;
});

albumCoverSave.addEventListener('click', async ()=>{
  if(!albumCoverFile.files[0] || !currentAlbumForCover){
    albumCoverModal.style.display = 'none';
    return;
  }

  const coverBlob = albumCoverFile.files[0].slice(0, albumCoverFile.files[0].size, albumCoverFile.files[0].type);
  const coverUrl = URL.createObjectURL(coverBlob);

  // Update all songs in this album
  for(let song of library){
    if(song.album === currentAlbumForCover){
      song.coverBlob = coverBlob;
      song.coverUrl = coverUrl;
      song.updatedAt = Date.now();
      try {
        await idbUpdate(db, 'songs', {
          id: song.id,
          name: song.name,
          artist: song.artist,
          album: song.album,
          trackPos: song.trackPos,
          audioBlob: song.audioBlob,
          coverBlob: coverBlob,
          createdAt: song.createdAt
        });
      } catch(err){
        console.error('Update error', err);
      }
    }
  }

  renderLibrary();
  albumCoverModal.style.display = 'none';
  currentAlbumForCover = null;
});

/* ---------- account UI behavior ---------- */
profileArea.addEventListener('click', ()=>{
  const acct = loadAccount();
  acctName.value = acct ? acct.name : '';
  acctPic.value = '';
  nameError.style.display = 'none';
  accountModal.style.display = 'flex';
});

acctCancel.addEventListener('click', ()=>{
  accountModal.style.display = 'none';
});

acctSave.addEventListener('click', async ()=>{
  const name = acctName.value.trim();
  const check = isNameInappropriate(name);
  if(check.bad){
    nameError.textContent = check.reason;
    nameError.style.display = 'block';
    return;
  }
  let avatarData = null;
  if(acctPic.files[0]){
    avatarData = await fileToDataURL(acctPic.files[0]);
  }
  saveAccount({ name, avatar: avatarData });
  accountModal.style.display = 'none';
});

window.addEventListener('load', ()=>{
  loadAccount();
  const acct = localStorage.getItem(USER_KEY);
  if(!acct){
    setTimeout(()=> accountModal.style.display = 'flex', 350);
  }
});

function fileToDataURL(file){
  return new Promise((res)=>{
    const r = new FileReader();
    r.onload = ()=> res(r.result);
    r.readAsDataURL(file);
  });
}

/* ---------- songs upload flow (IndexedDB) ---------- */
openDB().then(async d=>{ db = d; await loadArtists(); loadLibrary(); });

async function loadLibrary(){
  const rows = await idbGetAll(db, 'songs');
  library = rows.map(r=>{
    const audioUrl = r.audioBlob ? URL.createObjectURL(r.audioBlob) : null;
    const coverUrl = r.coverBlob ? URL.createObjectURL(r.coverBlob) : null;
    return {...r, audioUrl, coverUrl};
  });
  renderLibrary();
}

async function deleteSong(id){
  try {
    await idbDelete(db, 'songs', id);
    library = library.filter(s => s.id !== id);
    renderLibrary();
  } catch(err){
    console.error('DB delete error', err);
  }
}

uploadBtn.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', e=>{
  const files = Array.from(e.target.files || []).filter(f => f.type && f.type.startsWith('audio'));
  if(files.length === 0) { fileInput.value=''; return; }
  pendingFiles = files;
  pendingIndex = 0;
  openMetaForPending();
  fileInput.value = '';
});

function openMetaForPending(){
  if(pendingIndex >= pendingFiles.length) return;
  const f = pendingFiles[pendingIndex];
  const name = f.name.replace(/\.[^/.]+$/, '');
  metaTitle.value = name;
  metaArtist.value = '';
  selectedArtist = null;
  metaAlbum.value = '';
  metaTrackPos.value = '';
  metaCover.value = '';
  metaArtistPfp.value = '';
  artistPfpContainer.style.display = 'none';
  artistSuggestions.innerHTML = '';
  artistSuggestions.classList.remove('active');
  metaModal.style.display = 'flex';
}

metaCancel.addEventListener('click', ()=>{
  pendingFiles = [];
  pendingIndex = 0;
  metaModal.style.display = 'none';
});

metaSave.addEventListener('click', async ()=>{
  const f = pendingFiles[pendingIndex];
  if(!f){ metaModal.style.display='none'; return; }
  const title = metaTitle.value.trim() || f.name;
  const artist = metaArtist.value.trim() || 'Unknown';
  const album = metaAlbum.value.trim() || 'Unknown Album';
  const trackPos = parseInt(metaTrackPos.value) || 0;
  const coverFile = metaCover.files[0] || null;
  const artistPfpFile = metaArtistPfp.files[0] || null;

  const audioBlob = f.slice(0, f.size, f.type);
  let coverBlob = null;
  if(coverFile){
    coverBlob = coverFile.slice(0, coverFile.size, coverFile.type);
  }

  // Save artist if new
  if(!artists[artist] && artistPfpFile){
    const pfpData = await fileToDataURL(artistPfpFile);
    await saveArtist(artist, pfpData);
  } else if(!artists[artist] && !artistPfpFile){
    await saveArtist(artist, null);
  }

  const rec = { name: title, artist, album, trackPos, audioBlob, coverBlob, createdAt: Date.now() };
  try {
    const id = await idbAdd(db, 'songs', rec);
    const audioUrl = URL.createObjectURL(audioBlob);
    const coverUrl = coverBlob ? URL.createObjectURL(coverBlob) : null;
    const newSong = { ...rec, id, audioUrl, coverUrl };
    library.push(newSong);

    // Check if this album has multiple songs without cover
    const albumSongs = library.filter(s => s.album === album);
    if(albumSongs.length >= 2){
      const noCoverCount = albumSongs.filter(s => !s.coverUrl).length;
      if(noCoverCount >= 2){
        showNotification(album, albumSongs.length);
      }
    }

    renderLibrary();
  } catch(err){
    console.error('DB add error', err);
  }

  pendingIndex++;
  metaModal.style.display = 'none';
  if(pendingIndex < pendingFiles.length) {
    setTimeout(openMetaForPending, 150);
  }
});

/* ---------- UI render ---------- */
function renderLibrary(){
  uploadedList.innerHTML = '';
  grid.innerHTML = '';
  if(library.length === 0){
    uploadedList.innerHTML = '<div class="small-muted">No uploaded songs</div>';
  } else {
    // Group by artist, then by album
    const groupedArtists = {};
    library.forEach(s => {
      const artistKey = s.artist || 'Unknown Artist';
      if(!groupedArtists[artistKey]) groupedArtists[artistKey] = {};
      
      const albumKey = s.album || 'Unknown Album';
      if(!groupedArtists[artistKey][albumKey]) groupedArtists[artistKey][albumKey] = [];
      groupedArtists[artistKey][albumKey].push(s);
    });

    // Sort songs within each album by trackPos
    Object.keys(groupedArtists).forEach(artistKey => {
      Object.keys(groupedArtists[artistKey]).forEach(albumKey => {
        groupedArtists[artistKey][albumKey].sort((a, b) => (a.trackPos || 0) - (b.trackPos || 0));
      });
    });

    // Render sidebar list (all songs with delete)
    library.forEach(s => {
      const div = document.createElement('div');
      div.className = 'pl-item';
      div.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${s.name}</span>
                       <div class="pl-item-actions">
                         <span class="small-muted">▶</span>
                         <button class="delete-btn" data-id="${s.id}">✕</button>
                       </div>`;
      div.querySelector('span').addEventListener('click', ()=> playSong(library.indexOf(s)));
      div.querySelector('.delete-btn').addEventListener('click', (e)=>{
        e.stopPropagation();
        deleteSong(s.id);
      });
      uploadedList.appendChild(div);
    });

    // Render grid with hierarchical grouping: Artist > Album > Songs
    Object.keys(groupedArtists).forEach(artistKey => {
      const artistGroup = document.createElement('div');
      artistGroup.className = 'artist-group';

      const artistHeader = document.createElement('div');
      artistHeader.className = 'artist-header';
      const artistAvatar = document.createElement('div');
      artistAvatar.className = 'artist-avatar';
      if(artists[artistKey] && artists[artistKey].pfp){
        artistAvatar.style.backgroundImage = `url(${artists[artistKey].pfp})`;
      }
      artistHeader.appendChild(artistAvatar);
      const artistName = document.createElement('span');
      artistName.textContent = artistKey;
      artistHeader.appendChild(artistName);
      artistGroup.appendChild(artistHeader);

      Object.keys(groupedArtists[artistKey]).forEach(albumKey => {
        const albumGroup = document.createElement('div');
        albumGroup.className = 'album-group';

        const header = document.createElement('div');
        header.className = 'album-header';
        const toggle = document.createElement('span');
        toggle.className = 'album-header-toggle';
        toggle.textContent = '▼';
        const title = document.createElement('div');
        title.className = 'album-header-title';
        title.textContent = albumKey;
        const count = document.createElement('div');
        count.className = 'album-header-count';
        count.textContent = `${groupedArtists[artistKey][albumKey].length} songs`;

        header.appendChild(toggle);
        header.appendChild(title);
        header.appendChild(count);

        const songsContainer = document.createElement('div');
        songsContainer.className = 'album-songs';
        let isOpen = true;

        groupedArtists[artistKey][albumKey].forEach(s => {
          const card = document.createElement('div');
          card.className = 'card';
          const coverStyle = s.coverUrl ? `background-image:url(${s.coverUrl});background-size:cover;background-position:center` : '';
          card.innerHTML = `<div class="card-cover" style="${coverStyle}">${!s.coverUrl ? 'Audio' : ''}</div>
                            <h4>${s.name}</h4><p>${s.artist}</p>
                            <button class="card-delete" data-id="${s.id}">Delete</button>`;
          card.querySelector('.card-cover').addEventListener('click', ()=> playSong(library.indexOf(s)));
          card.querySelector('h4').addEventListener('click', ()=> playSong(library.indexOf(s)));
          card.querySelector('p').addEventListener('click', ()=> playSong(library.indexOf(s)));
          card.querySelector('.card-delete').addEventListener('click', (e)=>{
            e.stopPropagation();
            deleteSong(s.id);
          });
          songsContainer.appendChild(card);
        });

        header.addEventListener('click', ()=>{
          isOpen = !isOpen;
          songsContainer.classList.toggle('hidden');
          toggle.textContent = isOpen ? '▼' : '▶';
        });

        albumGroup.appendChild(header);
        albumGroup.appendChild(songsContainer);
        artistGroup.appendChild(albumGroup);
      });

      grid.appendChild(artistGroup);
    });
  }
}

/* ---------- player ---------- */
function playSong(index){
  if(index < 0 || index >= library.length) return;
  const song = library[index];
  currentIndex = index;
  audio.src = song.audioUrl;
  audio.play();
  playing = true;
  titleEl.textContent = song.name;
  artistEl.textContent = song.artist;
  cvEl.style.backgroundImage = song.coverUrl ? `url(${song.coverUrl})` : '';
  updatePlayButton();
}

function updatePlayButton(){
  playBtn.textContent = playing ? '⏸' : '▶️';
}

playBtn.addEventListener('click', ()=>{
  if(currentIndex === -1 && library.length > 0){
    playSong(0); return;
  }
  if(playing) audio.pause(); else audio.play();
});

prevBtn.addEventListener('click', ()=>{
  if(library.length === 0) return;
  currentIndex = (currentIndex <= 0) ? library.length - 1 : currentIndex - 1;
  playSong(currentIndex);
});

nextBtn.addEventListener('click', ()=>{
  if(library.length === 0) return;
  currentIndex = (currentIndex + 1) % library.length;
  playSong(currentIndex);
});

audio.addEventListener('timeupdate', ()=>{
  if(!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressInner.style.width = pct + '%';
  curTimeEl.textContent = formatTime(audio.currentTime);
  durTimeEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('play', ()=>{ playing=true; updatePlayButton(); });
audio.addEventListener('pause', ()=>{ playing=false; updatePlayButton(); });
audio.addEventListener('ended', ()=>{ nextBtn.click(); });

progressOuter.addEventListener('click', (e)=>{
  if(!audio.duration) return;
  const rect = progressOuter.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  audio.currentTime = pct * audio.duration;
});

function formatTime(t){
  if(!t || isNaN(t)) return '0:00';
  const mins = Math.floor(t / 60);
  const secs = Math.floor(t % 60).toString().padStart(2, '0');
  return mins + ':' + secs;
}

/* cleanup */
window.addEventListener('beforeunload', ()=>{
  library.forEach(s=>{
    if(s.audioUrl) URL.revokeObjectURL(s.audioUrl);
    if(s.coverUrl) URL.revokeObjectURL(s.coverUrl);
  });
});
</script>
